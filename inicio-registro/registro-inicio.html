<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="/inicio-registro/style-reg-ini.css">
    <link rel="icon" type="image/png" href="/images/car.svg">
</head>
<body>

    <a href="/index.html" class="back-home">Volver Al Inicio</a>
    <div class="container">
        <div class="container-form">
            <form class="sign-in">
                <h2>Inicia Sesión</h2>
                <div class="social-networks">
                    <ion-icon name="logo-google"></ion-icon>
                    <ion-icon name="logo-facebook"></ion-icon>
                    <ion-icon name="logo-instagram"></ion-icon>
                </div>
                <!-- Inicio de sesion -->
                <span>Use Su Correo Y Contraseña</span>

                <div class="container-input">
                    <ion-icon name="mail-outline"></ion-icon>
                    <input type="text" placeholder="Email" id="login-email">
                </div>

                <div class="container-input">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" placeholder="password" id="login-password">
                </div>

                <a href="/inicio-registro/recuperar-contraseña.html">¿Olvidaste Tu Contraseña?</a>
                <button type="button" class="button" id="btn-login">INICIAR SESIÓN</button>
                <div id="login-error" style="color: red; font-size: 12px; margin-top: 10px; display: none;"></div>
            </form>
        </div>

        <div class="container-form">
            <form class="sign-up">
                <h2>Registrate</h2>
                <div class="social-networks">
                    <ion-icon name="logo-google"></ion-icon>
                    <ion-icon name="logo-facebook"></ion-icon>
                    <ion-icon name="logo-instagram"></ion-icon>
                </div>
                <span>Use Su Correo Electronico Para Registrarse</span>
                
                <div class="container-input">
                    <ion-icon name="person-outline"></ion-icon>
                    <input type="text" placeholder="Nombre" id="register-name">
                </div>
                
                <div class="container-input">
                    <ion-icon name="mail-outline"></ion-icon>
                    <input type="text" placeholder="Email" id="register-email">
                </div>
                
                <div class="container-input">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" placeholder="password" id="register-password">
                </div>
                
                <button type="button" class="button" id="btn-register">REGISTRARSE</button>
                <div id="register-error" style="color: red; font-size: 12px; margin-top: 10px; display: none;"></div>
            </form>
        </div>


        <div class="container-welcome">
            <div class="welcome-sign-up welcome">
                <h3>¡Bienvenido!</h3>
                <p>Ingrese Sus Datos Para Usar Todas Las Funciones Del Sitio</p>
                <button class="button" id="btn-sign-up">Registrarse</button>
            </div>
            <div class="welcome-sign-in welcome">
                <h3>¡Hola!</h3>
                <p>Registrese Con Sus Datos Para Usar Todas Las Funciones Del Sitio</p>
                <button class="button" id="btn-sign-in">Iniciar Sesión</button>
            </div>
        </div>            
    </div>

    <!-- IONICONS -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <!-- animación -->
    <script src="/inicio-registro/script-sng.js"></script>
    
    <!-- FIREBASE SCRIPT (NUEVO) -->
    <script type="module">
        // ============================================
        // CONFIGURACIÓN DE FIREBASE
        // ============================================
        
    const firebaseConfig = {
        apiKey: "AIzaSyDE93o5qd45mX98N2OIK1VmoMiLYpmjHkw",
        authDomain: "cheloshop-b09.firebaseapp.com",
        databaseURL: "https://cheloshop-b09-default-rtdb.firebaseio.com",
        projectId: "cheloshop-b09",
        storageBucket: "cheloshop-b09.firebasestorage.app",
        messagingSenderId: "350042741633",
        appId: "1:350042741633:web:3f0125638c65333f5e2680",
        measurementId: "G-XGDGHR2VWD"
    };

        // Importar Firebase Authentication
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ============================================
        // FUNCIÓN DE REGISTRO CON FIREBASE
        // ============================================
        const btnRegister = document.getElementById("btn-register");
        const registerName = document.getElementById("register-name");
        const registerEmail = document.getElementById("register-email");
        const registerPassword = document.getElementById("register-password");
        const registerError = document.getElementById("register-error");

        async function registrarUsuario(email, password, nombre) {
            try {
                // Crear usuario en Firebase Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Guardar información adicional (nombre) en Realtime Database
                await set(ref(db, 'usuarios/' + user.uid), {
                    nombre: nombre,
                    email: email,
                    fechaRegistro: new Date().toISOString()
                });
                
                // Guardar en localStorage para tu sistema actual
                localStorage.setItem("usuarioLogueado", "true");
                localStorage.setItem("usuarioNombre", nombre);
                localStorage.setItem("usuarioEmail", email);
                localStorage.setItem("usuarioUID", user.uid);
                
                alert("✅ ¡Registro exitoso! Bienvenido " + nombre);
                window.location.href = "/index.html";
                
            } catch (error) {
                let mensajeError = "";
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        mensajeError = "❌ Este correo ya está registrado";
                        break;
                    case 'auth/invalid-email':
                        mensajeError = "❌ Correo electrónico inválido";
                        break;
                    case 'auth/weak-password':
                        mensajeError = "❌ La contraseña debe tener al menos 6 caracteres";
                        break;
                    default:
                        mensajeError = "❌ Error: " + error.message;
                }
                registerError.textContent = mensajeError;
                registerError.style.display = "block";
                console.error(error);
            }
        }

        // ============================================
        // FUNCIÓN DE LOGIN CON FIREBASE
        // ============================================
        const btnLogin = document.getElementById("btn-login");
        const loginEmail = document.getElementById("login-email");
        const loginPassword = document.getElementById("login-password");
        const loginError = document.getElementById("login-error");

        async function iniciarSesion(email, password) {
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Obtener datos adicionales de la base de datos
                const { get, ref: dbRef } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js");
                const usuarioRef = dbRef(db, 'usuarios/' + user.uid);
                const snapshot = await get(usuarioRef);
                
                let nombre = email.split('@')[0]; // nombre por defecto
                if (snapshot.exists()) {
                    nombre = snapshot.val().nombre;
                }
                
                // Guardar en localStorage
                localStorage.setItem("usuarioLogueado", "true");
                localStorage.setItem("usuarioNombre", nombre);
                localStorage.setItem("usuarioEmail", email);
                localStorage.setItem("usuarioUID", user.uid);
                
                alert("✅ ¡Inicio de sesión exitoso! Bienvenido " + nombre);
                window.location.href = '/productos/productos.html';
                
            } catch (error) {
                let mensajeError = "";
                switch (error.code) {
                    case 'auth/user-not-found':
                        mensajeError = "❌ Usuario no encontrado";
                        break;
                    case 'auth/wrong-password':
                        mensajeError = "❌ Contraseña incorrecta";
                        break;
                    case 'auth/invalid-email':
                        mensajeError = "❌ Correo electrónico inválido";
                        break;
                    default:
                        mensajeError = "❌ ¡¡Error!! correo electronico no encontrado";
                }
                loginError.textContent = mensajeError;
                loginError.style.display = "block";
                console.error(error);
            }
        }

        // ============================================
        // VALIDACIONES EXISTENTES
        // ============================================
        function validarLogin() {
            let esValido = true;
            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();
            
            if (email === "") {
                mostrarError(loginEmail, "❌ El correo electrónico es obligatorio");
                esValido = false;
            } else if (!email.includes("@") || !email.includes(".")) {
                mostrarError(loginEmail, "❌ Ingrese un correo electrónico válido");
                esValido = false;
            } else {
                mostrarExito(loginEmail);
            }
            
            if (password === "") {
                mostrarError(loginPassword, "❌ La contraseña es obligatoria");
                esValido = false;
            } else if (password.length < 6) {
                mostrarError(loginPassword, "❌ La contraseña debe tener al menos 6 caracteres");
                esValido = false;
            } else {
                mostrarExito(loginPassword);
            }
            
            return esValido;
        }
        
        function validarRegistro() {
            let esValido = true;
            const nombre = registerName.value.trim();
            const email = registerEmail.value.trim();
            const password = registerPassword.value.trim();
            
            if (nombre === "") {
                mostrarError(registerName, "❌ El nombre es obligatorio");
                esValido = false;
            } else if (nombre.length < 3) {
                mostrarError(registerName, "❌ El nombre debe tener al menos 3 caracteres");
                esValido = false;
            } else {
                mostrarExito(registerName);
            }
            
            if (email === "") {
                mostrarError(registerEmail, "❌ El correo electrónico es obligatorio");
                esValido = false;
            } else if (!email.includes("@") || !email.includes(".")) {
                mostrarError(registerEmail, "❌ Ingrese un correo electrónico válido");
                esValido = false;
            } else {
                mostrarExito(registerEmail);
            }
            
            if (password === "") {
                mostrarError(registerPassword, "❌ La contraseña es obligatoria");
                esValido = false;
            } else if (password.length < 6) {
                mostrarError(registerPassword, "❌ La contraseña debe tener al menos 6 caracteres");
                esValido = false;
            } else {
                mostrarExito(registerPassword);
            }
            
            return esValido;
        }
        
        // Funciones de utilidad
        function mostrarError(input, mensaje) {
            const formGroup = input.parentElement;
            const errorDiv = document.createElement("div");
            errorDiv.className = "error-message";
            errorDiv.innerText = mensaje;
            formGroup.appendChild(errorDiv);
            input.classList.add("input-error");
        }
        
        function mostrarExito(input) {
            input.classList.add("input-success");
        }
        
        function eliminarMensajesError() {
            const errores = document.querySelectorAll(".error-message");
            errores.forEach(error => error.remove());
        }
        
        function eliminarClasesError() {
            const inputs = document.querySelectorAll("input");
            inputs.forEach(input => {
                input.classList.remove("input-error", "input-success");
            });
        }
        
        // ============================================
        // EVENTOS DE LOS BOTONES
        // ============================================
        btnRegister.addEventListener("click", function(e) {
            e.preventDefault();
            eliminarMensajesError();
            eliminarClasesError();
            registerError.style.display = "none";
            
            if (validarRegistro()) {
                registrarUsuario(
                    registerEmail.value.trim(),
                    registerPassword.value.trim(),
                    registerName.value.trim()
                );
            }
        });
        
        btnLogin.addEventListener("click", function(e) {
            e.preventDefault();
            eliminarMensajesError();
            eliminarClasesError();
            loginError.style.display = "none";
            
            if (validarLogin()) {
                iniciarSesion(
                    loginEmail.value.trim(),
                    loginPassword.value.trim()
                );
            }
        });
        
        // Verificar si ya hay sesión activa
        function verificarSesion() {
            const usuarioLogueado = localStorage.getItem("usuarioLogueado");
            if (usuarioLogueado === "true") {
                console.log("Usuario ya tiene sesión activa");
                window.location.href = "/index.html";
            }
        }

// ============================================
// ACTIVAR ENTER PARA LOGIN Y REGISTRO
// ============================================
        const loginInputs = [loginEmail, loginPassword];
        loginInputs.forEach(input => {
            if (input) {
                input.addEventListener("keypress",  function(e) {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        btnLogin.click()
                    }
                })
            }
        })

        const registerInputs = [registerName, registerEmail, registerPassword];
registerInputs.forEach(input => {
    if (input) {
        input.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                btnRegister.click();
            }
        });
    }
});
        
        verificarSesion();
        console.log("✅ Firebase Authentication conectado");
    </script>
    <script src="/transicion.js"></script>
</body>
</html>
