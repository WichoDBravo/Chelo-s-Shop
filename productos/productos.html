<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
    <link rel="stylesheet" href="/productos/product.css">
    <link rel="icon" type="image/png" href="/images/car.svg">
</head>
<body>

    <header class="header">
        <div class="menu container">
            <a href="/admin-produc/admin.html" class="logo">Chelo´s</a>
            <input type="checkbox" id="menu">
            <label for="menu">
                <img src="/images/menu.png" class="menu-icono" alt="">
            </label>
            <nav class="navbar">
                <ul>
                    <li><a href="/index.html">Inicio</a></li>
                    <li id="auth-button-container"></li>
                </ul>
            </nav>
            <div class="menu-overlay"></div>
            <div>
                <li class="submenu" id="submenu-carrito">
                    <img src="/images/car.svg" id="img-carruto" alt="carrito">
                    <div id="carrito">
                        <table id="lista-carrito">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Precio</th>
                                    <th>Unidades</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                        <a href="#" id="vaciar-carrito" class="btn-3">Vaciar Carrito</a>
                    </div>
                </li>
            </div>
        </div>
    </header>

    <!-- BUSCADOR DE PRODUCTOS -->
    <div class="buscador-container">
        <div class="buscador-wrapper">
            <input type="text" id="buscadorProductos" placeholder="🔍 Buscar productos por nombre o marca...">
            <div id="resultadosBusqueda"></div>
        </div>
    </div>
<!-- FILTROS Y ORDENAMIENTO -->
<div class="filtros-container">
    <div class="filtro-categorias">
        <label>📁 Categoría:</label>
        <select id="filtroCategoria">
            <option value="todos">Todos los productos</option>
            <option value="lacteos">🥛 Lácteos</option>
            <option value="liquidos">💧 Líquidos</option>
            <option value="charcuteria">🍖 Charcutería</option>
            <option value="herramientas">🔧 Herramientas</option>
            <option value="enlatados">🥫 Enlatados / Conservas</option>
            <option value="escolares">📚 Útiles Escolares</option>
            <option value="legumbres">🥔 Legumbres / Verduras</option>
            <option value="otros">🎲 Otros</option>
        </select>
    </div>

    <div class="filtro-orden">
        <label>🔄 Ordenar por:</label>
        <select id="ordenarProductos">
            <option value="nombre-asc">Nombre (A-Z)</option>
            <option value="nombre-desc">Nombre (Z-A)</option>
            <option value="precio-asc">Precio (menor a mayor)</option>
            <option value="precio-desc">Precio (mayor a menor)</option>
            <option value="stock-desc">Stock (mayor a menor)</option>
        </select>
    </div>
</div>

    <div class="productos-container">
        <div class="productos-grid" id="listaProductos">
            <div class="loading">Cargando productos...</div>
        </div>
    </div>

    <script type="module" src="/productos/product.js"></script>
    <script src="/transicion.js"></script>
</body>
</html>
